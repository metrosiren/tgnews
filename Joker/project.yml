name: Joker

options:
  bundleIdPrefix: com.metrosiren
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Joker:
    type: application
    platform: iOS
    sources:
      - path: Joker
    info:
      path: Joker/Info.plist
      properties:
        CFBundleDisplayName: Joker
        CFBundleName: Joker
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UIStatusBarStyle: UIStatusBarStyleLightContent
        NSHumanReadableCopyright: "© 2026 metrosiren"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrosiren.Joker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Joker/Info.plist
